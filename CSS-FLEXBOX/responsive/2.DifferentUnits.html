<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- 
    RESPOSIVE UNITS
    em, rem, %, vw, vh

    EM : PARENT IN FONT SIZE NA GÖRE BÜYÜKLÜK VERİR
    REM : HTML ETİKETİNİN FONT SIZE NA GÖRE BÜYÜKLÜK VERİR
    % : HTML YE VERİLEN FONT-SIZE IN YÜZDESİNİ ALARAK BÜYÜKLÜK VERİR
    VW : 
 -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        div {
            width: 40vw;
            height: 10vh;
            background: #a7a7a7;
        }

        .backgraund {
            background: url(./arka\ plan.jpeg) center center no-repeat;
            background-size: cover;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            color: #fff;
            align-items: center;
            padding: 3rem;
        }

        h1 {

            font-size: 3rem;
            margin-bottom: 1rem;
        }

        p {
            font-size: 2rem;
            letter-spacing: 2px;
            color: rgb(146, 142, 142);
        }

        @media(max-width : 500px) {
            h1 {
                margin-bottom: 0.5rem;
                font-size: 2rem;
            }

            p {
                font-size: 1rem;
                color: seagreen;
                text-transform:inherit;
                text-shadow: khaki;
            }
        }
    </style>

</head>

<body>
    <div class="backgraund">
        <h1>NARUTOOO BORUTOOO</h1>
        <p>NARUTO SENİNLE BÜYÜMÜŞ GİBİYİM RESMEN</p>
    </div>
</body>

</html>
