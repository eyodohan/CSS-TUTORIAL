    YAPTIRABİLİYORUZ VE GÜZEL Bİ ÖZELLİK */

    flex-grow: 1;
}
.box-2{
    background: khaki;
    /* order: 1; */

}
.box-3{
    background: green;

    DEĞİŞTİREBİLİYORUZ */
    /* flex-grow: 1; */
}

</head>

<body>
