BURADA TEXT ALIGN KULLANARAK METİNLERİ SAĞA SOLA ORTAYA ALDIK*/
div {
    width: 400px;
    height: 400px;
    border: 1px solid black;
    text-align: center;
}

p{
    letter-spacing: 1px;
    /* LETTER-SPACING İLE BİZ YAZILARDAKİ HARFLERİN ARALIĞINI 
    AÇABİLİYORUZ. */
}
span {
   text-decoration: underline; 
   /* TEXT DECORATION ÖZELLİĞİ İLE SPAN İÇİNE ALDIĞIM KISMI
   ALTI ÇİZİLİ YAPTIK */
}
/* AŞAĞIDA A ETİKETİ İLE LİNK KOYDUK. DEFAULT OLARAK LİNK KONULAN
KISIM ALTI ÇİZİLİ OLUYOR.ANCAK BİZ BUNU TEXT DECORATİON:NONE YAPARAK 
KALDIRABİLİRİZ */
a{
    text-decoration: none;
}
h1{
    text-transform: uppercase;

    /* TEXT-TRANSFORM İLE METİNDEKİ YAZILARIN HARFLERİNİ 
    İLK HARFİ BÜYÜK VEYA BÜTÜN HARFLER BÜYÜK ŞEKLİNDE 
    DEĞİŞTİREBİLİYORUZ */
}

    </style>
</head>
