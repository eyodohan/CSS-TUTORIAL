<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÖRNEK TABLOYA BAKARAK YAPTIM</title>

    <style>
        table {
            border: 1px solid black;
            border-collapse: collapse;
            text-align: center;
            margin: 0 auto;
        }

        table {
            width: 50%;
            font-size: 1.5em;
        }

        tr,
        td,
        th {
            border: 1px solid black;
            padding: 3px 20px;
        }

        th {
            background: green;
            color: white;
        }

        tbody tr:nth-child(2n) {
            background: grey;
        }

        tbody tr:hover {
            background: red;
        }
    </style>
</head>

<body>
    <table>
        <thead>
            <tr>
                <th>ad</th>
                <th>departman</th>
                <th>maaş</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>eyüp</td>
                <td>bilişim</td>
                <td>10000</td>
            </tr>

            <tr>
                <td>zühtü</td>
                <td>bilişim</td>
                <td>6000</td>
            </tr>

            <tr>
                <td>rıfkı</td>
                <td>bilişim</td>
                <td>700</td>

            </tr>
            <tr>
                <td>rıfat</td>
                <td>bilişim</td>
                <td>3000</td>
            </tr>
        </tbody>
    </table>
</body>

</html>
